<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">

  <div class="logo">Smoke <span>& </span> Spice</div>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="nav-right">
    <button class="order-btn" onclick="showOrderPopup()">Order Now</button>
    <a href="login.html" class="signin">Sign In</a>
  </div>

</header>
<h1 class="cart-title">Your Cart</h1>
<div id="cart-items" style="padding:20px;"></div>

<h2 style="text-align:center;">Total: ₹<span id="total">0</span></h2>

<script src="script.js"></script>
<div id="order-popup" class="popup">
  <div class="popup-box">
    <h2>✅ Order Placed!!</h2>
    <p>Your delicious food is on the way 🍔</p>
  </div>
</div>

<!-- REVIEW POPUP (ADD HERE) -->
<div id="review-popup" class="popup">
  <div class="popup-box">
    <h2>⭐ Rate Your Experience</h2>

    <div class="stars">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>

    <textarea id="review-text" placeholder="Write your review..."></textarea>

    <button onclick="submitReview()">Submit Review</button>
  </div>
</div>
<script>
if(sessionStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}
</script>
</body>
</html>
